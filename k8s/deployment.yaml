apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-api-proxy
  labels:
    app: simple-api-proxy
spec:
  replicas: 1  # SQLite requires single writer — do not scale beyond 1
  selector:
    matchLabels:
      app: simple-api-proxy
  template:
    metadata:
      labels:
        app: simple-api-proxy
    spec:
      containers:
        - name: simple-api-proxy
          image: simple-api-proxy:latest
          ports:
            - containerPort: 4000
          args:
            - serve
            - "-port"
            - "4000"
            - "-db"
            - /data/keys.db
            - "-apikey"
            - /etc/secrets/key.dat
          env:
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: simple-api-proxy-admin
                  key: token
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 1
            periodSeconds: 5
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          volumeMounts:
            - name: apikey
              mountPath: /etc/secrets
              readOnly: true
            - name: data
              mountPath: /data
      volumes:
        - name: apikey
          secret:
            secretName: simple-api-proxy-apikey
        - name: data
          persistentVolumeClaim:
            claimName: simple-api-proxy-data
