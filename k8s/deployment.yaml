apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-api-proxy
  labels:
    app: simple-api-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-api-proxy
  template:
    metadata:
      labels:
        app: simple-api-proxy
    spec:
      containers:
        - name: simple-api-proxy
          image: simple-api-proxy:latest
          ports:
            - containerPort: 4000
          args:
            - serve
            - "-port"
            - "4000"
            - "-keys"
            - /etc/config/keys.json
            - "-apikey"
            - /etc/secrets/key.dat
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 1
            periodSeconds: 5
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          volumeMounts:
            - name: apikey
              mountPath: /etc/secrets
              readOnly: true
            - name: keys
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: apikey
          secret:
            secretName: simple-api-proxy-apikey
        - name: keys
          configMap:
            name: simple-api-proxy-keys
